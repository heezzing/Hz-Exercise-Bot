version: "3.9"

services:
  db:
    build:
      context: workout-curation
      dockerfile: Dockerfile.db
    container_name: workout_db
    environment:
      POSTGRES_USER: workout
      POSTGRES_PASSWORD: workout1234
      POSTGRES_DB: workout_curation
    ports:
      - "5432:5432"
    volumes:
      - workout_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workout -d workout_curation"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: workout_backend
    ports:
      - "8000:8000"
    env_file:
      - workout-curation/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://workout:workout1234@db:5432/workout_curation
      USE_TF: "0"
      USE_JAX: "0"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: workout_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  workout_pgdata:
